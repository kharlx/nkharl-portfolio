<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tech Stack – Kharl Nieto</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
/* ================= THEME VARIABLES ================= */
:root {
  --bg: #ffffff;
  --text: #111111;
  --muted: #666666;
  --border: #e5e5e5;
  --chip-bg: #ffffff;
}

[data-theme="dark"] {
  --bg: #0f0f0f;
  --text: #f5f5f5;
  --muted: #aaaaaa;
  --border: #2a2a2a;
  --chip-bg: #1f1f1f;
}

/* ================= BASE ================= */
* {
  box-sizing: border-box;
  font-family: Inter, system-ui, sans-serif;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 32px;
}

/* ================= HEADER ================= */
.header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 40px;
}

.back-link {
  text-decoration: none;
  color: var(--text);
  font-weight: 500;
}

.back-link i {
  margin-right: 6px;
}

.header h1 {
  font-size: 28px;
  margin: 0;
}

/* ================= STACK SECTIONS ================= */
.stack-section {
  margin-bottom: 42px;
}

.stack-section h3 {
  margin-bottom: 14px;
  font-size: 18px;
}

/* ================= CHIPS ================= */
.chip-group {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.chip {
  padding: 6px 14px;
  font-size: 13px;
  border-radius: 8px;
  background: var(--chip-bg);
  border: 1px solid var(--border);
  transition: all 0.2s ease;
  cursor: default;
}

.chip:hover {
  transform: translateY(-2px);
}

/* ================= FOOTER ================= */
.footer {
  margin-top: 60px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <a href="index.html" class="back-link">
      <i class="fas fa-arrow-left"></i> 
    </a>
    <h1>Tech Stack</h1>
  </div>

  <!-- FRONTEND -->
  <section class="stack-section">
    <h3>Frontend</h3>
    <div class="chip-group">
      <span class="chip">JavaScript</span>
      <span class="chip">HTML</span>
      <span class="chip">CSS</span>
      <span class="chip">Figma</span>
      <span class="chip">Adobe XD</span>
      <span class="chip">Vite</span>
    </div>
  </section>

  <!-- BACKEND -->
  <section class="stack-section">
    <h3>Backend</h3>
    <div class="chip-group">
      <span class="chip">PHP</span>
      <span class="chip">Laravel</span>
      <span class="chip">MySQL</span>
     
     
    </div>
  </section>

  <!-- DATABASE -->
  <section class="stack-section">
    <h3>Database</h3>
    <div class="chip-group">
      <span class="chip">MySQL</span>
    </div>
  </section>

  <!-- DEVOPS / TOOLS -->
  <section class="stack-section">
    <h3>Developer Tools</h3>
    <div class="chip-group">
      <span class="chip">Git</span>
      <span class="chip">GitHub</span>
      <span class="chip">VS Code</span>
      <span class="chip">XAMPP</span>
    </div>
  </section>

  <!-- AI / EMERGING -->
  <section class="stack-section">
    <h3>AI & Emerging Technologies</h3>
    <div class="chip-group">
      <span class="chip">AI Tools</span>
    </div>
  </section>

  <!-- FOOTER -->
  <div class="footer">
    © 2026 Kharl Nieto. All Rights Reserved.
  </div>

</div>

<script>
  const savedTheme = localStorage.getItem("theme");
  if (savedTheme) {
    document.documentElement.setAttribute("data-theme", savedTheme);
  }
</script>

</body>
</html>
